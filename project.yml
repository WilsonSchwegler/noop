name: WarbFit
options:
  bundleIdPrefix: net.wilsonschwegler
  deploymentTarget:
    iOS: "16.0"
    watchOS: "8.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ARCHS: "$(ARCHS_STANDARD)"
  configs:
    Release:
      ONLY_ACTIVE_ARCH: NO
packages:
  TrackerProtocol:
    path: Packages/TrackerProtocol
  TrackerStore:
    path: Packages/TrackerStore
  StrandAnalytics:
    path: Packages/StrandAnalytics
  StrandDesign:
    path: Packages/StrandDesign
targets:
  WarbFitiOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: StrandiOS
        excludes:
          - "Resources/Info.plist"
          - "Resources/WarbFitiOS.entitlements"
    info:
      path: StrandiOS/Resources/Info.plist
      properties:
        CFBundleName: WarbFit
        CFBundleDisplayName: WarbFit
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        NSBluetoothAlwaysUsageDescription: "WarbFit connects directly to your fitness tracker strap over Bluetooth to read heart rate, R-R intervals, battery, and sensor data locally on your iPhone. Nothing leaves your device."
        NSHealthShareUsageDescription: "When the companion app is selected, WarbFit reads Apple Health sleep, workouts, heart rate, HRV, resting heart rate, activity, and vitals on-device to display health-derived trends and calculate WarbFit exertion and readiness."
        NSLocationWhenInUseUsageDescription: "WarbFit uses your location during outdoor runs and hikes to record your route, distance, and pace."
        NSMotionUsageDescription: "WarbFit uses iPhone motion step counts only when fitness tracker step data is not available, so the Today steps card is not based on a weak motion estimate."
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - bluetooth-central
          - location
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: StrandiOS/Resources/WarbFitiOS.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.wilsonschwegler.warbfit
        PRODUCT_NAME: WarbFit
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - package: TrackerProtocol
      - package: TrackerStore
      - package: StrandAnalytics
      - package: StrandDesign
      - target: WarbFitWatch
        embed: true
  WarbFitWatch:
    type: application
    platform: watchOS
    deploymentTarget: "8.0"
    sources:
      - path: StrandWatch
        excludes:
          - "Resources/WarbFitWatch.entitlements"
    info:
      path: StrandWatch/Resources/Info.plist
      properties:
        CFBundleName: WarbFit
        CFBundleDisplayName: WarbFit
        WKApplication: true
        WKCompanionAppBundleIdentifier: net.wilsonschwegler.warbfit
        NSHealthShareUsageDescription: "WarbFit reads live Apple Watch workout metrics such as heart rate, distance, and active energy during workouts you start in the app."
        NSHealthUpdateUsageDescription: "WarbFit saves workouts and measured workout metrics you start on Apple Watch to Apple Health."
        NSLocationWhenInUseUsageDescription: "WarbFit uses Apple Watch location during outdoor runs and hikes to record your route, distance, and pace."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: StrandWatch/Resources/WarbFitWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.wilsonschwegler.warbfit.watchkitapp
        PRODUCT_NAME: WarbFit
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: WatchAppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
