name: WarbFit
options:
  bundleIdPrefix: net.wilsonschwegler
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ARCHS: "$(ARCHS_STANDARD)"
  configs:
    Release:
      ONLY_ACTIVE_ARCH: NO
packages:
  WhoopProtocol:
    path: Packages/WhoopProtocol
  WhoopStore:
    path: Packages/WhoopStore
  StrandAnalytics:
    path: Packages/StrandAnalytics
  StrandDesign:
    path: Packages/StrandDesign
targets:
  WarbFitiOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: StrandiOS
        excludes:
          - "Resources/Info.plist"
          - "Resources/WarbFitiOS.entitlements"
    info:
      path: StrandiOS/Resources/Info.plist
      properties:
        CFBundleName: WarbFit
        CFBundleDisplayName: WarbFit
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        NSBluetoothAlwaysUsageDescription: "WarbFit connects directly to your fitness tracker strap over Bluetooth to read heart rate, R-R intervals, battery, and sensor data locally on your iPhone. Nothing leaves your device."
        NSHealthShareUsageDescription: "WarbFit reads Apple Health sleep analysis on-device to calculate a sleep score. Recovery, strain, activity, workouts, HRV, and resting heart rate come from your fitness tracker strap."
        NSHealthUpdateUsageDescription: "WarbFit can export fitness tracker heart rate, HRV, detected sleep stages, workouts, and active energy to Apple Health when you explicitly request it."
        NSLocationWhenInUseUsageDescription: "WarbFit uses your location during outdoor runs and hikes to record your route, distance, and pace."
        NSMotionUsageDescription: "WarbFit uses iPhone motion step counts only when fitness tracker step data is not available, so the Today steps card is not based on a weak motion estimate."
        UIBackgroundModes:
          - bluetooth-central
          - location
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: StrandiOS/Resources/WarbFitiOS.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.wilsonschwegler.warbfit
        PRODUCT_NAME: WarbFit
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - package: WhoopProtocol
      - package: WhoopStore
      - package: StrandAnalytics
      - package: StrandDesign
